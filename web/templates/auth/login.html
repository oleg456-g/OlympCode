{% extends "base.html" %}
{% block title %}Вход — OlympCode{% endblock %}
{% block content %}
<div class="form-card">
  <div class="card">
    <div style="text-align:center; margin-bottom:28px">
      <div style="font-family:var(--mono); font-size:22px; font-weight:700">
        OlympCode<span style="color:var(--green)">.</span>
      </div>
      <p style="color:var(--text-2); margin-top:6px; font-size:14px">Вход в аккаунт</p>
    </div>

    {% if error %}
    <div class="form-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/auth/login">
      <div class="form-group">
        <label>Имя пользователя</label>
        <input class="form-input" type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input class="form-input" type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn--primary btn--full">Войти</button>
    </form>

    <div class="form-footer">
      Нет аккаунта? <a href="/auth/register">Зарегистрироваться</a>
    </div>
  </div>
</div>
{% endblock %}
